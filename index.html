<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Psychology & Mental Journal - Interactive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #334155;
        }

        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        
        body {
            background-color: var(--bg-dark);
            margin: 0;
            padding: 20px;
            font-family: 'Urbanist', sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: #020617;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--accent);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header-section {
            text-align: center;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 30px;
            margin-bottom: 30px;
        }

        h1 { font-size: 36px; margin: 0; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        .quote { font-style: italic; color: var(--text-dim); margin-top: 10px; }

        /* FORM CONTROLS */
        .grid-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; color: var(--text-dim); font-size: 14px; text-transform: uppercase; }
        
        input[type="text"], input[type="date"], select, textarea {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-family: inherit;
            width: 100%;
        }

        textarea { min-height: 80px; resize: vertical; }

        /* CHECKBOX CUSTOM */
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .check-item:hover { background: var(--accent); }
        .check-item input { accent-color: var(--primary); width: 18px; height: 18px; }

        /* SECTIONS */
        .section-card {
            background: rgba(30, 41, 59, 0.5);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 25px;
            border-left: 5px solid var(--primary);
        }

        .section-card h2 {
            margin-top: 0;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* ACTIONS */
        .actions {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }

        .btn-print { background: var(--primary); color: #020617; }
        .btn-clear { background: #ef4444; color: white; }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }

        /* RATING */
        .rating-group {
            display: flex;
            justify-content: space-around;
            text-align: center;
            margin-top: 20px;
        }

        .rating-item input {
            width: 50px;
            text-align: center;
            background: var(--primary);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            color: #020617;
        }

        @media print {
            .actions, .btn-clear { display: none; }
            body { padding: 0; background: white; }
            .container { border: none; box-shadow: none; max-width: 100%; width: 100%; color: black; background: white; }
            input, textarea, select { color: black !important; background: #f1f5f9 !important; border: 1px solid #cbd5e1 !important; }
            .section-card { background: #f8fafc !important; border: 1px solid #e2e8f0 !important; color: black; }
            h1, h2, label { color: #0f172a !important; }
            .check-item { background: #f1f5f9 !important; border: 1px solid #e2e8f0; color: black; }
        }

        @media (max-width: 768px) {
            .two-col { grid-template-columns: 1fr; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container" id="journalContent">
        <header class="header-section">
            <h1>Trading Psychology & Mental Journal</h1>
            <p class="quote">"Mindset is your edge. Master your mind, master the market."</p>
        </header>

        <!-- INFO DASAR -->
        <div class="grid-meta">
            <div class="form-group">
                <label>Tanggal</label>
                <input type="date">
            </div>
            <div class="form-group">
                <label>Sesi</label>
                <select>
                    <option>Pilih Sesi</option>
                    <option>ASIA</option>
                    <option>LONDON</option>
                    <option>NEW YORK</option>
                </select>
            </div>
            <div class="form-group">
                <label>Market</label>
                <input type="text" placeholder="XAUUSD, BTC, dll">
            </div>
        </div>

        <div class="grid-meta">
            <div class="form-group">
                <label>Kualitas Tidur</label>
                <select>
                    <option>Kurang</option>
                    <option>Cukup</option>
                    <option>Sangat Baik</option>
                </select>
            </div>
            <div class="form-group">
                <label>Level Energi</label>
                <select>
                    <option>Rendah</option>
                    <option>Sedang</option>
                    <option>Tinggi</option>
                </select>
            </div>
        </div>

        <!-- 1. PREPARATION -->
        <section class="section-card">
            <h2><i class="fa-solid fa-list-check"></i> 1. Sebelum Trading (Preparation)</h2>
            <label>Kondisi Emosi (Centang yang dirasakan):</label>
            <div class="checkbox-group">
                <label class="check-item"><input type="checkbox"> Tenang</label>
                <label class="check-item"><input type="checkbox"> Yakin</label>
                <label class="check-item"><input type="checkbox"> Fokus</label>
                <label class="check-item"><input type="checkbox"> FOMO</label>
                <label class="check-item"><input type="checkbox"> Overthinking</label>
                <label class="check-item"><input type="checkbox"> Lelah</label>
            </div>
            
            <div class="two-col" style="margin-top: 20px;">
                <div class="form-group">
                    <label>Setup yang Dicari</label>
                    <textarea placeholder="Contoh: Breakout retest H1..."></textarea>
                </div>
                <div class="form-group">
                    <label>Rencana Risk & Target</label>
                    <textarea placeholder="Risk 1%, Target 3%..."></textarea>
                </div>
            </div>
        </section>

        <!-- 2. EXECUTION -->
        <section class="section-card">
            <h2><i class="fa-solid fa-crosshairs"></i> 2. Saat Entry (Execution)</h2>
            <div class="two-col">
                <div class="form-group">
                    <label>Arah Trade</label>
                    <select>
                        <option>BUY</option>
                        <option>SELL</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Sesuai Rencana?</label>
                    <select>
                        <option>YA</option>
                        <option>TIDAK</option>
                    </select>
                </div>
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>Alasan Entry (Plan atau Impuls?)</label>
                <textarea></textarea>
            </div>
        </section>

        <!-- 3. IN-TRADE -->
        <section class="section-card">
            <h2><i class="fa-solid fa-hourglass-start"></i> 3. Saat Trade Berjalan</h2>
            <div class="checkbox-group">
                <label class="check-item"><input type="checkbox"> Tetap Tenang</label>
                <label class="check-item"><input type="checkbox"> Ingin Close Cepat</label>
                <label class="check-item"><input type="checkbox"> Ingin Geser SL/TP</label>
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>Catatan selama floating</label>
                <textarea></textarea>
            </div>
        </section>

        <!-- 4. REVIEW -->
        <section class="section-card">
            <h2><i class="fa-solid fa-square-check"></i> 4. Setelah Close (Review)</h2>
            <div class="grid-meta">
                <div class="form-group">
                    <label>Hasil</label>
                    <select>
                        <option>PROFIT</option>
                        <option>LOSS</option>
                        <option>BREAK EVEN</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>RR Tercurah (R)</label>
                    <input type="text" placeholder="Contoh: 2.5R">
                </div>
            </div>
            <label>Kesalahan Mental:</label>
            <div class="checkbox-group">
                <label class="check-item"><input type="checkbox"> Overtrade</label>
                <label class="check-item"><input type="checkbox"> Revenge Trade</label>
                <label class="check-item"><input type="checkbox"> Tidak Disiplin SL</label>
                <label class="check-item"><input type="checkbox"> Serakah</label>
            </div>
        </section>

        <!-- 5. EVALUASI -->
        <section class="section-card">
            <h2><i class="fa-solid fa-chart-line"></i> 5. Evaluasi & Rating</h2>
            <div class="form-group">
                <label>Pelajaran Penting Hari Ini</label>
                <textarea></textarea>
            </div>
            <div class="rating-group">
                <div class="rating-item">
                    <label>Disiplin</label><br>
                    <input type="number" min="1" max="10" value="0"> / 10
                </div>
                <div class="rating-item">
                    <label>Mental</label><br>
                    <input type="number" min="1" max="10" value="0"> / 10
                </div>
                <div class="rating-item">
                    <label>Eksekusi</label><br>
                    <input type="number" min="1" max="10" value="0"> / 10
                </div>
            </div>
        </section>
    </div>

    <div class="actions">
        <button class="btn btn-clear" onclick="window.location.reload()">
            <i class="fa-solid fa-trash"></i> Reset
        </button>
        <button class="btn btn-print" onclick="window.print()">
            <i class="fa-solid fa-file-pdf"></i> Download PDF / Print
        </button>
    </div>

    <script>
        // Placeholder untuk logic tambahan di masa depan
        console.log("Journal Ready to use!");
    </script>
</body>
</html>
