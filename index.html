<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal - Secure Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #10b981;
            --secondary: #0ea5e9;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #334155;
            --danger: #ef4444;
            --input-bg: #020617;
        }

        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        
        body {
            background-color: var(--bg-dark);
            margin: 0;
            padding: 20px;
            font-family: 'Urbanist', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* AUTH SCREEN */
        #auth-container {
            width: 100%;
            max-width: 400px;
            background: #020617;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--accent);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .auth-header h2 { color: var(--primary); margin-bottom: 10px; }
        .auth-header p { color: var(--text-dim); margin-bottom: 30px; font-size: 14px; }

        .auth-form { display: flex; flex-direction: column; gap: 15px; }
        
        /* APP CONTENT */
        #app-content {
            display: none;
            width: 100%;
            max-width: 1100px;
            margin-top: 20px;
        }

        .container {
            background: #020617;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--accent);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .nav-tabs { display: flex; gap: 10px; margin-bottom: 30px; background: var(--card-bg); padding: 5px; border-radius: 12px; border: 1px solid var(--accent); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); font-weight: 700; cursor: pointer; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .tab-btn.active { background: var(--primary); color: #020617; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .header-section { text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 30px; margin-bottom: 30px; }
        h1 { font-size: 32px; margin: 0; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; text-align: left; }
        label { font-weight: 600; color: var(--text-dim); font-size: 13px; text-transform: uppercase; }
        
        input, select, textarea { background: var(--card-bg); border: 1px solid var(--accent); padding: 12px; border-radius: 8px; color: white; font-family: inherit; width: 100%; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }

        .section-card { background: rgba(30, 41, 59, 0.5); padding: 25px; border-radius: 16px; margin-bottom: 25px; border-left: 5px solid var(--primary); text-align: left; }
        .checkbox-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 10px; }
        .check-item { display: flex; align-items: center; gap: 10px; background: var(--card-bg); padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; }
        .check-item input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }

        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--primary); color: #020617; width: 100%; }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        .btn-google { background: white; color: #334155; width: 100%; border: 1px solid #ddd; margin-top: 10px; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 12px; color: var(--text-dim); }

        .divider { margin: 20px 0; display: flex; align-items: center; color: var(--text-dim); font-size: 12px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--accent); margin: 0 10px; }

        @media print { .nav-tabs, .actions, .user-info { display: none; } }
    </style>
</head>
<body>

    <!-- SCREEN 1: LOGIN/REGISTER -->
    <div id="auth-container">
        <div class="auth-header">
            <i class="fa-solid fa-brain fa-3x" style="color: var(--primary); margin-bottom: 15px;"></i>
            <h2 id="auth-title">Jurnal Psikologi</h2>
            <p id="auth-subtitle">Amankan data trading dan mental Anda</p>
        </div>

        <form class="auth-form" id="authForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="authEmail" placeholder="email@contoh.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="authPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" id="authBtn">Masuk</button>
        </form>

        <div class="divider">ATAU</div>

        <button class="btn btn-google" onclick="handleGoogleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18" alt="Google">
            Login dengan Google
        </button>

        <p style="margin-top: 20px; font-size: 14px; color: var(--text-dim);">
            <span id="toggleQuestion">Belum punya akun?</span> 
            <span style="color: var(--secondary); cursor: pointer; font-weight: bold;" onclick="toggleAuthMode()" id="toggleText">Daftar</span>
        </p>
    </div>

    <!-- SCREEN 2: MAIN DASHBOARD -->
    <div id="app-content">
        <div class="user-info">
            <span id="user-display">Email: -</span>
            <button class="btn btn-danger" style="padding: 5px 10px; font-size: 10px;" onclick="handleLogout()">Logout</button>
        </div>

        <div class="container">
            <nav class="nav-tabs">
                <button class="tab-btn active" onclick="openTab('psychology')">
                    <i class="fa-solid fa-brain"></i> Psychology Journal
                </button>
                <button class="tab-btn" onclick="openTab('trading-log')">
                    <i class="fa-solid fa-chart-line"></i> Technical Trade Log
                </button>
            </nav>

            <div id="psychology" class="tab-content active">
                <header class="header-section">
                    <h1>Psychology Journal</h1>
                    <p class="quote">"Disiplin adalah jembatan antara target dan pencapaian."</p>
                </header>
                
                <form id="psyForm">
                    <div class="grid-meta" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px;">
                        <div class="form-group"><label>Tanggal</label><input type="date" id="psyDate"></div>
                        <div class="form-group">
                            <label>Sesi</label>
                            <select id="psySession"><option>ASIA</option><option>LONDON</option><option>NEW YORK</option></select>
                        </div>
                        <div class="form-group">
                            <label>Energi</label>
                            <select id="psyEnergy"><option>Low</option><option>Medium</option><option>High</option></select>
                        </div>
                    </div>

                    <section class="section-card">
                        <h2><i class="fa-solid fa-heart"></i> Emosi Sebelum Entry</h2>
                        <div class="checkbox-group" id="psyEmotions">
                            <label class="check-item"><input type="checkbox" value="Tenang"> Tenang</label>
                            <label class="check-item"><input type="checkbox" value="Yakin"> Yakin</label>
                            <label class="check-item"><input type="checkbox" value="Fokus"> Fokus</label>
                            <label class="check-item"><input type="checkbox" value="FOMO"> FOMO</label>
                            <label class="check-item"><input type="checkbox" value="Gelisah"> Gelisah</label>
                        </div>
                    </section>
                    
                    <section class="section-card">
                        <h2><i class="fa-solid fa-pen"></i> Narasi Psikologi</h2>
                        <textarea id="psyNarrative" placeholder="Apa yang kamu rasakan hari ini? Apakah ada distraksi?"></textarea>
                    </section>

                    <button type="button" class="btn btn-primary" onclick="handleSavePsychology()">Simpan Jurnal Mental</button>
                </form>
            </div>

            <div id="trading-log" class="tab-content">
                <header class="header-section">
                    <h1 style="color: var(--secondary);">Trade Log</h1>
                    <p class="quote">"Data tidak pernah bohong."</p>
                </header>

                <div class="section-card" style="border-left-color: var(--secondary);">
                    <h2><i class="fa-solid fa-plus-circle"></i> Catat Trade</h2>
                    <form id="tradeForm">
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;">
                            <div class="form-group"><label>Tanggal</label><input type="date" id="tradeDate"></div>
                            <div class="form-group"><label>Pair</label><input type="text" id="tradePair" placeholder="XAU/USD"></div>
                            <div class="form-group"><label>Side</label><select id="tradeSide"><option>Long</option><option>Short</option></select></div>
                            <div class="form-group"><label>Profit/Loss ($)</label><input type="text" id="tradePL" placeholder="+500"></div>
                        </div>
                        <button type="button" class="btn btn-secondary" style="width:100%; margin-top:10px;" onclick="handleSaveTrade()">Simpan Trade</button>
                    </form>
                </div>

                <div class="section-card" style="border-left-color: var(--secondary);">
                    <div style="overflow-x:auto;">
                        <table style="width:100%; border-collapse: collapse;">
                            <thead>
                                <tr style="border-bottom: 2px solid var(--accent); color: var(--secondary); text-align: left;">
                                    <th style="padding:10px;">Tanggal</th>
                                    <th style="padding:10px;">Pair</th>
                                    <th style="padding:10px;">Side</th>
                                    <th style="padding:10px;">P/L</th>
                                    <th style="padding:10px;">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="historyBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIG PROJECT JURNAL-DATA-ID-50986
        const firebaseConfig = {
            apiKey: "AIzaSyC65IM8g1lIsONtxEVH-8IcxCFjK4lNFUU",
            authDomain: "jurnal-data-id-50986.firebaseapp.com",
            projectId: "jurnal-data-id-50986",
            storageBucket: "jurnal-data-id-50986.firebasestorage.app",
            messagingSenderId: "483868497031",
            appId: "1:483868497031:web:eade2b968f5744fea95422",
            measurementId: "G-TLYM437NNM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let isLoginMode = true;

        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? 'Jurnal Psikologi' : 'Daftar Akun';
            document.getElementById('authBtn').innerText = isLoginMode ? 'Masuk' : 'Daftar';
            document.getElementById('toggleQuestion').innerText = isLoginMode ? 'Belum punya akun?' : 'Sudah punya akun?';
            document.getElementById('toggleText').innerText = isLoginMode ? 'Daftar' : 'Login';
        };

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPassword').value;
            const btn = document.getElementById('authBtn');
            btn.disabled = true;
            btn.innerText = "Memproses...";

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    alert("Akun berhasil dibuat!");
                }
            } catch (err) { 
                alert("Auth Error: " + err.message); 
            } finally {
                btn.disabled = false;
                btn.innerText = isLoginMode ? 'Masuk' : 'Daftar';
            }
        };

        window.handleGoogleLogin = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (err) { alert("Gagal Login Google: " + err.message); }
        };

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const authContainer = document.getElementById('auth-container');
            const appContent = document.getElementById('app-content');
            if (user) {
                authContainer.style.display = 'none';
                appContent.style.display = 'block';
                document.getElementById('user-display').innerText = `Akun: ${user.email}`;
                document.body.style.alignItems = 'flex-start';
                setupListeners(user);
            } else {
                authContainer.style.display = 'block';
                appContent.style.display = 'none';
                document.body.style.alignItems = 'center';
            }
        });

        function setupListeners(user) {
            // Path: users/{uid}/trades
            const tradeCol = collection(db, 'users', user.uid, 'trades');
            onSnapshot(tradeCol, (snap) => {
                const historyBody = document.getElementById('historyBody');
                historyBody.innerHTML = '';
                snap.forEach(tDoc => {
                    const d = tDoc.data();
                    const row = document.createElement('tr');
                    row.style.borderBottom = '1px solid #334155';
                    row.innerHTML = `
                        <td style="padding:10px;">${d.date || '-'}</td>
                        <td style="padding:10px;">${d.pair || '-'}</td>
                        <td style="padding:10px; color:${d.side === 'Long' ? '#10b981' : '#ef4444'}">${d.side}</td>
                        <td style="padding:10px; font-weight:bold">${d.pl}</td>
                        <td style="padding:10px;"><i class="fa-solid fa-trash" style="color:var(--danger); cursor:pointer;" onclick="window.deleteTrade('${tDoc.id}')"></i></td>
                    `;
                    historyBody.appendChild(row);
                });
            }, (err) => console.error("Firestore Listen Error:", err));
        }

        window.handleSaveTrade = async () => {
            const user = auth.currentUser;
            if (!user) return;
            const data = {
                date: document.getElementById('tradeDate').value,
                pair: document.getElementById('tradePair').value,
                side: document.getElementById('tradeSide').value,
                pl: document.getElementById('tradePL').value,
                timestamp: serverTimestamp()
            };
            try {
                await addDoc(collection(db, 'users', user.uid, 'trades'), data);
                document.getElementById('tradeForm').reset();
                document.getElementById('tradeDate').value = new Date().toISOString().split('T')[0];
            } catch (e) { alert("Simpan Gagal: " + e.message); }
        };

        window.handleSavePsychology = async () => {
            const user = auth.currentUser;
            if (!user) return;
            const emotions = Array.from(document.querySelectorAll('#psyEmotions input:checked')).map(cb => cb.value);
            const data = {
                date: document.getElementById('psyDate').value,
                session: document.getElementById('psySession').value,
                energy: document.getElementById('psyEnergy').value,
                emotions: emotions,
                narrative: document.getElementById('psyNarrative').value,
                timestamp: serverTimestamp()
            };
            try {
                await addDoc(collection(db, 'users', user.uid, 'psychology'), data);
                alert("Data Psikologi tersimpan di Firebase Console lo!");
                document.getElementById('psyNarrative').value = '';
                document.querySelectorAll('#psyEmotions input').forEach(cb => cb.checked = false);
            } catch (e) { alert("Simpan Gagal: " + e.message); }
        };

        window.deleteTrade = async (id) => {
            if (!confirm("Hapus data ini?")) return;
            try {
                await deleteDoc(doc(db, 'users', auth.currentUser.uid, 'trades', id));
            } catch (e) { alert(e.message); }
        };

        window.openTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        const now = new Date().toISOString().split('T')[0];
        document.getElementById('tradeDate').value = now;
        document.getElementById('psyDate').value = now;

    </script>
</body>
</html>
